<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ飞车抽奖活动奖池汇总</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .card-image-container {
            position: relative;
            overflow: hidden;
        }

        .card-image {
            width: 100%;
            height: auto;
            display: block;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card-image:hover {
            transform: scale(1.02);
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            color: #64c8ff;
            font-size: 1.1rem;
            margin-bottom: 8px;
            border-left: 4px solid #64c8ff;
            padding-left: 10px;
        }

        .card-description {
            color: #ddd;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .reward-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 10px;
        }

        .reward-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 0.78rem;
            word-break: break-word;
        }

        .reward-item.highlight {
            color: #ff6b6b;
            font-weight: bold;
        }

        .search-highlight {
            background-color: #ffeb3b;
            color: #000;
            padding: 1px 3px;
            border-radius: 2px;
            font-weight: bold;
        }

        .card-title .search-highlight {
            background-color: #ffeb3b;
        }

        .stats {
            text-align: center;
            margin-bottom: 20px;
            color: #888;
            font-size: 0.9rem;
        }

        .stats span {
            color: #64c8ff;
            font-weight: bold;
        }

        .search-box {
            text-align: center;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .search-box input {
            width: 300px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #64c8ff;
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.3);
        }

        .search-box input::placeholder {
            color: #aaa;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 1.1rem;
        }

        /* Back to top button */
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(100, 200, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 99;
            backdrop-filter: blur(10px);
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            background: rgba(100, 200, 255, 1);
            transform: translateY(-3px);
        }

        /* Modal for enlarged image */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 8px;
            touch-action: pinch-zoom;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
            transition: color 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
        }

        .modal-close:hover {
            color: #64c8ff;
        }

        /* Responsive breakpoints */
        @media (max-width: 1100px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 15px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 0;
            }

            h1 {
                font-size: 1.2rem;
                margin-bottom: 5px;
            }

            .subtitle {
                font-size: 0.85rem;
                margin-bottom: 15px;
            }

            .gallery {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .card-content {
                padding: 12px;
            }

            .card-title {
                font-size: 1rem;
            }

            .reward-list {
                grid-template-columns: 1fr;
            }

            .reward-item {
                font-size: 0.75rem;
                padding: 5px 7px;
            }

            .search-box {
                position: sticky;
                top: 5px;
                margin-bottom: 15px;
            }

            .search-box input {
                width: 90%;
                padding: 10px 15px;
                font-size: 0.95rem;
            }

            .stats {
                margin-bottom: 15px;
                font-size: 0.8rem;
            }

            .back-to-top {
                bottom: 10px;
                right: 10px;
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }
        }

        @media (max-width: 480px) {
            .gallery {
                grid-template-columns: 1fr;
            }

            .card-content {
                padding: 10px;
            }
        }

        @media (min-width: 1600px) {
            .container {
                max-width: 1600px;
            }
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            }
        }
    </style>
</head>

        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');
        const modalClose = document.getElementById('modal-close');
        const searchInput = document.getElementById('search-input');
        const backToTopBtn = document.getElementById('back-to-top');

        // Highlight search keyword in text
        function highlightKeyword(text, keyword) {
            if (!keyword) return text;
            const regex = new RegExp(`(${keyword})`, 'gi');
            return text.replace(regex, '<span class="search-highlight">$1</span>');
        }

        function renderGallery(filter = '') {
            gallery.innerHTML = '';
            const searchLower = filter ? filter.toLowerCase() : '';
            const filteredData = imageData.filter(item => {
                if (!filter) return true;
                if (item.name.toLowerCase().includes(searchLower)) return true;
                if (item.description.toLowerCase().includes(searchLower)) return true;
                if (item.rewards && item.rewards.some(r => r.text.toLowerCase().includes(searchLower))) {
                    return true;
                }
                return false;
            });

            if (filteredData.length === 0) {
                const noResults = document.createElement('div');
                noResults.className = 'no-results';
                noResults.innerHTML = `
                    <p>🔍 没有找到匹配的结果</p>
                    <p style="margin-top: 10px; font-size: 0.9rem;">请尝试其他关键词</p>
                `;
                gallery.appendChild(noResults);
            } else {
                filteredData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.setAttribute('data-id', item.id);
                    card.setAttribute('loading', 'lazy');

                    // Highlight keyword in title
                    let titleText = `#${item.id} ${item.name}`;
                    if (filter) {
                        titleText = highlightKeyword(titleText, filter);
                    }

                    let rewardsHtml = '';
                    if (item.rewards && item.rewards.length > 0) {
                        rewardsHtml = '<div class="reward-list">' +
                            item.rewards.map(r => {
                                let rewardText = r.text;
                                if (filter) {
                                    rewardText = highlightKeyword(rewardText, filter);
                                }
                                return `<div class="reward-item${r.highlight ? ' highlight' : ''}">${rewardText}</div>`;
                            }).join('') +
                            '</div>';
                    }

                    let imgPath = item.id <= 100 ?
                        `resource/${item.id}-${item.name.replace(/ /g, '_')}.JPEG` :
                        `resource/${item.id}-${item.name.replace(/ /g, '_')}.png`;
                    card.innerHTML = `
                        <div class="card-image-container">
                            <img class="card-image" data-src="${imgPath}" alt="${item.name}" loading="lazy">
                        </div>
                        <div class="card-content">
                            <div class="card-title">${titleText}</div>
                            <div class="card-description">
                                <p>${item.description}</p>
                                ${rewardsHtml}
                            </div>
                        </div>
                    `;

                    card.querySelector('.card-image').addEventListener('click', function() {
                        modalImg.src = this.src || this.getAttribute('data-src');
                        modal.classList.add('active');
                    });

                    gallery.appendChild(card);
                });

                // Lazy loading with Intersection Observer
                if ('IntersectionObserver' in window) {
                    const lazyImages = document.querySelectorAll('.card-image[data-src]');
                    const imageObserver = new IntersectionObserver((entries, observer) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                const img = entry.target;
                                img.src = img.getAttribute('data-src');
                                img.removeAttribute('data-src');
                                observer.unobserve(img);
                            }
                        });
                    }, {
                        rootMargin: '200px 0px'
                    });
                    lazyImages.forEach(img => imageObserver.observe(img));
                } else {
                    // Fallback for older browsers
                    document.querySelectorAll('.card-image[data-src]').forEach(img => {
                        img.src = img.getAttribute('data-src');
                        img.removeAttribute('data-src');
                    });
                }
            }

            document.getElementById('total-count').textContent = filteredData.length;
        }

        // Back to top functionality
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTopBtn.classList.add('visible');
            } else {
                backToTopBtn.classList.remove('visible');
            }
        });

        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        // Initial render
        renderGallery();

        // Search functionality
        searchInput.addEventListener('input', function(e) {
            renderGallery(e.target.value);
        });

        // Close modal
        modalClose.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // Close on ESC key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                modal.classList.remove('active');
            }
        });
